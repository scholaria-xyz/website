<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary meta -->
  <title>Scholaria — Scientific Publishing, Reimagined</title>
  <meta name="description" content="A new platform for publishing and peer-reviewing scientific research. Transparent. Rigorous. Open." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://scholaria.xyz" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://scholaria.xyz" />
  <meta property="og:title" content="Scholaria — Scientific Publishing, Reimagined" />
  <meta property="og:description" content="A new platform for publishing and peer-reviewing scientific research. Transparent. Rigorous. Open." />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Scholaria — Scientific Publishing, Reimagined" />
  <meta name="twitter:description" content="A new platform for publishing and peer-reviewing scientific research. Transparent. Rigorous. Open." />

  <!-- Theme color for mobile browser chrome -->
  <meta name="theme-color" content="#000000" />

  <!-- Favicon: pure black rounded square -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23000'/></svg>" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@1,400&display=swap" rel="stylesheet" />

  <style>
    /* ── RESET ── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ── TOKENS ── */
    :root {
      --border: rgba(255, 255, 255, 0.07);
      --glow:   rgba(255, 255, 255, 0.04);
    }

    /* ── BASE ── */
    html {
      height: 100%;
      /* dvh for mobile browsers that account for address bar */
      height: 100dvh;
    }

    body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
    }

    /* ── FOCUS ── */
    :focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.5);
      outline-offset: 4px;
      border-radius: 4px;
    }

    /* ── NAV ── */
    nav {
      flex-shrink: 0;
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 48px;
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #fff;
      text-decoration: none;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px 32px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient glow */
    main::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, var(--glow), transparent);
      pointer-events: none;
    }

    /* ── COMING SOON TAG ── */
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 100px;
      padding: 7px 20px;
      margin-bottom: clamp(20px, 3vh, 40px);
      animation: fadeUp 0.9s ease both;
    }

    /* ── HEADLINE ── */
    h1 {
      font-size: clamp(40px, 7vw, 96px);
      font-weight: 700;
      line-height: 1.04;
      letter-spacing: -0.04em;
      color: #fff;
      margin-bottom: clamp(20px, 3vh, 36px);
      animation: fadeUp 0.9s ease 0.1s both;
    }

    h1 .muted {
      color: rgba(255, 255, 255, 0.22);
    }

    /* ── SUBTITLE ── */
    .subtitle {
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(15px, 1.6vw, 19px);
      font-weight: 400;
      font-style: italic;
      color: rgba(255, 255, 255, 0.48);
      line-height: 1.9;
      text-align: left;
      animation: fadeUp 0.9s ease 0.2s both;
    }

    /* ── FOOTER ── */
    footer {
      flex-shrink: 0;
      padding: 18px 24px;
      text-align: center;
      border-top: 1px solid var(--border);
    }

    footer p {
      font-size: 12px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.2px;
    }

    /* ── ANIMATION ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      nav  { padding: 0 24px; }
      main { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/">Scholaria</a>
  </nav>

  <main>
    <div class="tag">Coming Soon</div>
    <h1>Science, <span class="muted">finally</span> open.</h1>
    <p class="subtitle">
      Where research meets its reckoning.<br />
      Peer review, without the politics.<br />
      Knowledge, without the paywall.<br />
      Something is coming...
    </p>
  </main>

  <footer>
    <p>© 2026 Scholaria. All rights reserved.</p>
  </footer>

</body>
</html>
